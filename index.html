<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #16213e;
            padding: 40px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #00d4ff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 30px;
            font-size: 13px;
        }
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            background: #0f3460;
            color: #888;
            border: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .tab.active {
            background: #00d4ff;
            color: #000;
            font-weight: bold;
        }
        .form { display: none; }
        .form.active { display: block; }
        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #0f3460;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #00d4ff; }
        button {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #00b8d9; }
        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .message.success { background: #1a472a; color: #69db7c; display: block; }
        .message.error { background: #4a1a1a; color: #ff6b6b; display: block; }
        .lock-icon { text-align: center; font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock-icon">🔐</div>
        <h1>Chat App</h1>
        <p class="subtitle">Komunikasi Aman & Terenkripsi</p>

        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Login</button>
            <button class="tab" onclick="showTab('register')">Daftar</button>
        </div>

        <!-- Form Login -->
        <div class="form active" id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" />
            <input type="password" id="loginPassword" placeholder="Password" />
            <button onclick="login()">Masuk</button>
        </div>

        <!-- Form Register -->
        <div class="form" id="registerForm">
            <input type="text" id="regUsername" placeholder="Username" />
            <input type="password" id="regPassword" placeholder="Password" />
            <input type="password" id="regConfirm" placeholder="Konfirmasi Password" />
            <button onclick="register()">Daftar</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
