<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }
        .header h2 { color: #00d4ff; font-size: 18px; }
        .header-right { display: flex; gap: 10px; align-items: center; }
        .username-badge {
            background: #0f3460;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .logout-btn {
            background: #ff4444;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        /* MAIN LAYOUT */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid #0f3460;
        }
        .sidebar-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: transparent;
            color: #888;
            border: none;
            font-size: 13px;
            transition: 0.3s;
        }
        .sidebar-tab.active {
            color: #00d4ff;
            border-bottom: 2px solid #00d4ff;
        }
        .search-box {
            padding: 10px;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background: #0f3460;
            border: 1px solid #0f3460;
            border-radius: 20px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .user-list {
            flex: 1;
            overflow-y: auto;
        }
        .user-item {
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            border-bottom: 1px solid #0f346030;
        }
        .user-item:hover { background: #0f3460; }
        .user-item.active { background: #0f3460; }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00d4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 16px;
            position: relative;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #69db7c;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid #16213e;
        }
        .offline-dot {
            width: 10px;
            height: 10px;
            background: #888;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid #16213e;
        }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: bold; }
        .user-status { font-size: 11px; color: #888; }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .avatar { width: 35px; height: 35px; font-size: 14px; }
        .chat-header-info h3 { font-size: 15px; }
        .chat-header-info span { font-size: 12px; color: #888; }
        .no-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            flex-direction: column;
            gap: 10px;
        }
        .no-chat span { font-size: 50px; }

        /* MESSAGES */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message-bubble {
            max-width: 65%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
        }
        .message-bubble.sent {
            background: #00d4ff;
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }
        .message-bubble.received {
            background: #0f3460;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* INPUT AREA */
        .input-area {
            background: #16213e;
            padding: 15px 20px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 12px 15px;
            background: #0f3460;
            border: 1px solid #0f3460;
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus { border-color: #00d4ff; }
        .send-btn {
            background: #00d4ff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .file-btn {
            background: #0f3460;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ADMIN PANEL */
        .admin-panel {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .admin-panel h2 { color: #00d4ff; margin-bottom: 20px; }
        .user-card {
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-card-info { font-size: 14px; }
        .user-card-info span { color: #888; font-size: 12px; }
        .user-card-actions { display: flex; gap: 8px; }
        .btn-approve {
            background: #1a472a;
            color: #69db7c;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-reject {
            background: #4a1a1a;
            color: #ff6b6b;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-ban {
            background: #4a3000;
            color: #ffa500;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .status-badge {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-pending { background: #4a3000; color: #ffa500; }
        .status-approved { background: #1a472a; color: #69db7c; }
        .status-rejected { background: #4a1a1a; color: #ff6b6b; }
        .status-banned { background: #3a003a; color: #ff69b4; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #16213e; }
        ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h2>🔐 Chat App</h2>
        <div class="header-right">
            <span class="username-badge">👤 <span id="currentUser"></span></span>
            <button class="logout-btn" onclick="logout()">Keluar</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" onclick="showSideTab('users')">💬 Chat</button>
                <button class="sidebar-tab" onclick="showSideTab('groups')">👥 Grup</button>
                <button class="sidebar-tab" id="adminTab" style="display:none" onclick="showSideTab('admin')">👑 Admin</button>
            </div>
            <div class="search-box">
                <input type="text" placeholder="🔍 Cari pengguna..." id="searchInput" oninput="searchUser()" />
            </div>
            <div class="user-list" id="userList"></div>
        </div>

        <!-- CHAT / ADMIN AREA -->
        <div class="chat-area" id="chatArea">
            <div class="no-chat">
                <span>💬</span>
                <p>Pilih pengguna untuk mulai chat</p>
            </div>
        </div>

    </div>

    <input type="file" id="fileInput" style="display:none" onchange="uploadFile()" />
    <script src="app.js"></script>
</body>
</html>
